<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Trade Analytics</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script>if(typeof Recharts==="undefined"){document.getElementById("root").innerHTML="<div style=padding:40px;font-family:monospace;color:#ff3d5a>Recharts failed to load. Try refreshing.</div>";}</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#050608;--bg1:#0a0c10;--bg2:#0f1218;--bg3:#151921;
  --border:#1c2030;--t0:#f0f2f7;--t1:#8892a8;--t2:#4a5268;
  --green:#00ff88;--red:#ff3d5a;--yellow:#ffcc00;--blue:#4d9fff;
  --mono:'IBM Plex Mono',monospace;--display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif
}
body{background:var(--bg0);font-family:var(--body);color:var(--t0);min-height:100vh}
#root{min-height:100vh}
#boot{display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--mono);color:var(--t2);font-size:13px}
.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:stretch;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px;padding:14px 20px 14px 0;border-right:1px solid var(--border);margin-right:20px}
.bname{font-family:var(--display);font-size:22px;letter-spacing:.05em}
.bsub{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.2em}
.tabs{display:flex;flex:1}
.tab{padding:0 22px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;font-family:var(--body);display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--t1)}
.tab.orb.on{color:var(--yellow);border-bottom-color:var(--yellow)}
.tab.sf.on{color:var(--red);border-bottom-color:var(--red)}
.tab.ma.on{color:var(--green);border-bottom-color:var(--green)}
.page{padding:24px 28px;max-width:1400px;margin:0 auto}
.paste-wrap{background:var(--bg1);border:2px dashed var(--border);border-radius:16px;padding:48px 40px;text-align:center;margin-bottom:20px}
.paste-title{font-family:var(--display);font-size:32px;letter-spacing:.05em;margin-bottom:8px}
.paste-sub{font-family:var(--mono);font-size:11px;color:var(--t2);margin-bottom:24px;line-height:1.8;white-space:pre-line}
.paste-area{width:100%;height:130px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:var(--mono);font-size:11px;color:var(--t1);resize:none;outline:none;margin-bottom:14px;display:block}
.paste-area:focus{border-color:var(--yellow)}
.btn{padding:11px 28px;background:var(--yellow);color:#000;border:none;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.1em;margin-right:8px}
.btn:hover{opacity:.85}
.btn.sec{background:var(--bg2);color:var(--t1);border:1px solid var(--border)}
.btn.sec:hover{border-color:var(--t1);color:var(--t0)}
.url-row{margin-top:14px;font-family:var(--mono);font-size:10px;color:var(--t2)}
.url-row a{color:var(--blue);text-decoration:none}
.err{background:#12000a;border:1px solid #3d0018;border-radius:8px;padding:9px 14px;font-size:11px;font-family:var(--mono);color:var(--red);margin-bottom:14px;text-align:left}
.strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.sc{background:var(--bg1);padding:14px 16px}
.sl{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.sv{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--yellow)}.b{color:var(--blue)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:16px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:18px;overflow:hidden;margin-bottom:16px}
.ct{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--bg2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.tbl tr.selected td{background:#0d1117;cursor:pointer}
.tbl tr{cursor:pointer}
.detail-panel{background:#080a0f;border:1px solid #1c2030;border-radius:8px;padding:16px;margin-top:8px;font-family:IBM Plex Mono,monospace;font-size:11px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:10px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{color:#4a5268;font-size:9px;text-transform:uppercase;letter-spacing:.08em}
.detail-value{color:#e2e8f0;font-size:13px;font-weight:600}
.detail-value.g{color:#00ff88}
.detail-value.r{color:#ff3d5a}
.detail-value.b{color:#4d9fff}
.mn{font-family:var(--mono);font-size:11px}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600}
.buy{background:rgba(0,255,136,.1);color:var(--green)}
.sell{background:rgba(255,61,90,.1);color:var(--red)}
.win{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.15)}
.loss{background:rgba(255,61,90,.08);color:var(--red);border:1px solid rgba(255,61,90,.15)}
.hm-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
.hm-dl{font-family:var(--mono);font-size:8px;color:var(--t2);text-align:center}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hmc{aspect-ratio:1;border-radius:3px;cursor:default}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.pbar-top{position:absolute;top:0;left:0;right:0;height:2px}
.pn{font-weight:700;font-size:14px;margin-bottom:2px}
.ps{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:10px}
.pr{display:flex;justify-content:space-between;font-size:11px;color:var(--t1);margin-bottom:3px}
.pb{height:2px;background:var(--bg3);border-radius:1px;margin-top:8px}
.pbf{height:100%;border-radius:1px}
.ins{background:linear-gradient(135deg,rgba(77,159,255,.05),rgba(157,111,255,.05));border:1px solid rgba(77,159,255,.2);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.ins-i{font-size:16px;flex-shrink:0}
.ins-t{font-size:12px;color:var(--t1);line-height:1.5}
.ins-t strong{color:var(--t0)}
.st{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.2em;text-transform:uppercase;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.clear-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--t2);font-size:10px;font-family:var(--mono);cursor:pointer}
.clear-btn:hover{color:var(--red);border-color:var(--red)}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.info-lbl{font-family:var(--mono);font-size:10px;color:var(--t2)}
</style>
</head>
<body>
<div id="root"><div id="boot">Loading...</div></div>

<script>
// Safety net
window.onerror = function(msg,src,line,col,err){
  document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace;color:#ff3d5a;background:#050608;min-height:100vh"><h2>JS Error</h2><pre>'+msg+'\n'+src+':'+line+'</pre></div>';
};

// Wait for all scripts
window.addEventListener('load', function() {
  try {
    const h = React.createElement;
    const {useState, useMemo} = React;
    if (typeof Recharts === 'undefined') throw new Error('Recharts library failed to load. Please refresh the page.');
    const RC = Recharts;

    const URLS = {
      orb: 'https://web-production-f5a70.up.railway.app/trades/orb',
      sf:  'https://web-production-f5a70.up.railway.app/trades/sharkfin',
      ma:  'https://web-production-f5a70.up.railway.app/trades/alpaca'
    };

    function parseTrades(raw) {
      const arr = Array.isArray(raw) ? raw : (raw.trades || raw.results || Object.values(raw)[0] || []);
      if (!Array.isArray(arr)) throw new Error('Cannot find trades array in JSON');
      const out = [];
      arr.forEach(function(t, i) {
        const date = (t.openTime||t.closeTime||t.date||'').slice(0,10);
        if (!date.startsWith('2026')) return;
        const entry = parseFloat(t.price||t.averageClosePrice||t.entry||0);
        const exit  = parseFloat(t.averageClosePrice||t.closePrice||t.exit||entry);
        const pnl   = parseFloat(t.realizedPL||t.pl||t.pnl||t.profit||0);
        const units = parseFloat(t.currentUnits||t.initialUnits||t.units||1);
        const inst  = (t.instrument||t.pair||t.symbol||'UNKNOWN').replace('_','/');
        const dir   = units >= 0 ? 'buy' : 'sell';
        const open  = new Date(t.openTime||t.date||Date.now());
        const close = new Date(t.closeTime||t.date||Date.now());
        const dur   = Math.max(1, Math.round((close - open) / 60000));

        // Session: use stored value or infer from openTime
        // March 2026 = EDT (UTC-4), not EST (UTC-5)
        function inferSession(dt, isOrb) {
          const utcH = dt.getUTCHours();
          const utcM = dt.getUTCMonth(); // 0=Jan
          // EDT (UTC-4) runs Mar-Nov, EST (UTC-5) runs Nov-Mar
          const offset = (utcM >= 2 && utcM <= 10) ? 4 : 5;
          const etHour = (utcH - offset + 24) % 24;
          if (isOrb) {
            if (etHour >= 19 || etHour < 3) return 'Asia';
            if (etHour >= 9  && etHour < 17) return 'NY';
            return 'Other';
          } else {
            if (etHour >= 3  && etHour < 8)  return 'London';
            if (etHour >= 8  && etHour < 12) return 'London/NY';
            if (etHour >= 12 && etHour < 17) return 'NY';
            return 'Other';
          }
        }
        const isOrbTrade = !!(t.bot === 'ORB' || t.session_key);
        const storedSession = (t.session && t.session !== 'Unknown') ? t.session : null;
        const session = storedSession || inferSession(open, isOrbTrade);
        if (i < 3) console.log('Trade session debug:', t.openTime, '→ etHour check → session:', session, '| stored:', t.session);

        out.push({
          id: i, date, pair: inst, direction: dir,
          entry: +entry.toFixed(5), exit: +exit.toFixed(5),
          pnl: +pnl.toFixed(4), rMultiple: pnl > 0 ? 1 : -1,
          durationMin: dur, win: pnl > 0, session,
          maxProfit: t.maxProfit||null, maxDrawdown: t.maxDrawdown||null,
        });
      });
      if (!out.length) throw new Error('No 2026 trades found. Check date range in data.');
      return out;
    }

    function calcStats(trades) {
      if (!trades.length) return null;
      const wins   = trades.filter(function(t){return t.win;});
      const losses = trades.filter(function(t){return !t.win;});
      const totPnl = trades.reduce(function(s,t){return s+t.pnl;},0);
      const grossW = wins.reduce(function(s,t){return s+t.pnl;},0);
      const grossL = Math.abs(losses.reduce(function(s,t){return s+t.pnl;},0));
      const wr     = trades.length ? wins.length / trades.length : 0;
      const avgW   = wins.length ? grossW/wins.length : 0;
      const avgL   = losses.length ? grossL/losses.length : 0;
      const exp    = +(wr*avgW - (1-wr)*avgL).toFixed(4);
      const pf     = grossL > 0 ? +(grossW/grossL).toFixed(2) : '∞';
      const avgDur = +(trades.reduce(function(s,t){return s+t.durationMin;},0)/trades.length).toFixed(0);
      let run=0, peak=0, maxDD=0;
      const equity = trades.slice().reverse().map(function(t,i){
        run += t.pnl;
        if (run > peak) peak = run;
        var dd = peak - run;
        if (dd > maxDD) maxDD = dd;
        return {i: i+1, v: +run.toFixed(4)};
      });
      const pnlMA = equity.map(function(e,i,a){
        if (i < 6) return Object.assign({},e,{ma:null});
        var avg = a.slice(i-6,i+1).reduce(function(s,x){return s+x.v;},0)/7;
        return Object.assign({},e,{ma:+avg.toFixed(4)});
      });
      const rb = {};
      trades.forEach(function(t){
        var b = Math.round(t.rMultiple*2)/2;
        rb[b] = (rb[b]||0)+1;
      });
      const rDist = Object.keys(rb).map(function(r){return{r:+r,c:rb[r]};}).sort(function(a,b){return a.r-b.r;});
      const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dm = {};
      trades.forEach(function(t){
        var d = dows[new Date(t.date).getDay()];
        if (!dm[d]) dm[d]={pnl:0,count:0,wins:0};
        dm[d].pnl += t.pnl; dm[d].count++;
        if (t.win) dm[d].wins++;
      });
      const dowStats = dows.map(function(d){
        return {day:d, pnl:+((dm[d]?dm[d].pnl:0)).toFixed(4), count:dm[d]?dm[d].count:0, wr:dm[d]?+(dm[d].wins/dm[d].count*100).toFixed(0):0};
      });
      const cm = {};
      trades.forEach(function(t){cm[t.date]=(cm[t.date]||0)+t.pnl;});
      const cal = [];
      for (var i=34;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);var k=d.toISOString().slice(0,10);cal.push({date:k,pnl:+(cm[k]||0).toFixed(4)});}
      const pm = {};
      trades.forEach(function(t){
        if (!pm[t.pair]) pm[t.pair]={pair:t.pair,trades:[],pnl:0,wins:0};
        pm[t.pair].trades.push(t); pm[t.pair].pnl+=t.pnl;
        if(t.win) pm[t.pair].wins++;
      });
      const pairStats = Object.values(pm).map(function(p){
        return {pair:p.pair,count:p.trades.length,pnl:+p.pnl.toFixed(4),
          wr:+(p.wins/p.trades.length*100).toFixed(1),
          avgDur:+(p.trades.reduce(function(s,t){return s+t.durationMin;},0)/p.trades.length).toFixed(0)};
      }).sort(function(a,b){return b.pnl-a.pnl;});
      const ins = [];
      const adows = dowStats.filter(function(d){return d.count>0;});
      if (adows.length) {
        var best  = adows.reduce(function(a,b){return b.wr>a.wr?b:a;});
        var worst = adows.reduce(function(a,b){return b.wr<a.wr?b:a;});
        ins.push('Win rate peaks on <strong>'+best.day+'</strong> at <strong>'+best.wr+'%</strong>');
        if (worst.day !== best.day) ins.push('Lowest win rate on <strong>'+worst.day+'</strong> — consider sitting out');
      }
      if (pairStats.length) ins.push('<strong>'+pairStats[0].pair+'</strong> is your top pair — '+pairStats[0].wr+'% win rate');
      if (pairStats.length>1 && pairStats[pairStats.length-1].pnl<0)
        ins.push('<strong>'+pairStats[pairStats.length-1].pair+'</strong> is bleeding — review or cut');
      return {total:trades.length,winRate:+(wr*100).toFixed(1),totalPnl:+totPnl.toFixed(4),
        grossW:+grossW.toFixed(4),grossL:+grossL.toFixed(4),exp,pf,avgDur,
        maxDD:+maxDD.toFixed(4),equity,pnlMA,rDist,dowStats,cal,pairStats,ins};
    }

    var tt = {background:'#0a0c10',border:'1px solid #1c2030',borderRadius:8,fontSize:11,fontFamily:'IBM Plex Mono'};

    function Heatmap(props) {
      var cal = props.cal;
      var mx = Math.max.apply(null, cal.map(function(c){return Math.abs(c.pnl);}));
      mx = mx || 0.001;
      function col(p) {
        if (p===0) return '#1c2030';
        var i = Math.min(Math.abs(p)/mx,1);
        return p>0 ? 'rgba(0,255,136,'+(0.15+i*0.7)+')' : 'rgba(255,61,90,'+(0.15+i*0.7)+')';
      }
      return h('div',null,
        h('div',{className:'hm-days'},['S','M','T','W','T','F','S'].map(function(d,i){return h('div',{key:i,className:'hm-dl'},d);})),
        h('div',{className:'heatmap'},cal.map(function(c,i){return h('div',{key:i,className:'hmc',style:{background:col(c.pnl)},title:c.date+': '+(c.pnl>=0?'+':'')+c.pnl});}))
      );
    }

    function SessionBreakdown(props) {
      var trades = props.trades, isSf = props.isSf;
      // ORB: Asia / NY    |   Sharkfin: London / London-NY / NY
      var sessions = isSf
        ? [
            {key:'London',    label:'London',       emoji:'🇬🇧', color:'#4d9fff'},
            {key:'London/NY', label:'London/NY',    emoji:'⚡',  color:'#ff9f43'},
            {key:'NY',        label:'NY',           emoji:'🗽', color:'#ffcc00'},
          ]
        : [
            {key:'Asia', label:'Asia', emoji:'🌏', color:'#7c6af5'},
            {key:'NY',   label:'NY',   emoji:'🗽', color:'#ffcc00'},
          ];

      function sessionStats(key) {
        var ts = trades.filter(function(t){return t.session===key;});
        if (!ts.length) return null;
        var wins = ts.filter(function(t){return t.win;}).length;
        var pnl  = ts.reduce(function(a,t){return a+t.pnl;},0);
        return {
          count: ts.length,
          wr: ((wins/ts.length)*100).toFixed(1),
          pnl: pnl.toFixed(4),
          pairs: [...new Set(ts.map(function(t){return t.pair;}))]
        };
      }

      var hasAny = sessions.some(function(s){return sessionStats(s.key);});
      if (!hasAny) return null;

      function SCard(props) {
        var s=props.s, sess=props.sess;
        if (!s) return h('div',{className:'card',style:{flex:1,opacity:.35}},
          h('span',{className:'ct'},sess.emoji+' '+sess.label),
          h('div',{style:{color:'#4a5268',fontSize:11,fontFamily:'IBM Plex Mono',marginTop:8}},'No trades yet')
        );
        return h('div',{className:'card',style:{flex:1,borderTop:'2px solid '+sess.color}},
          h('span',{className:'ct'},sess.emoji+' '+sess.label+' Session'),
          h('div',{style:{display:'flex',gap:16,marginTop:10,flexWrap:'wrap'}},
            h('div',{className:'sc'},h('div',{className:'sl'},'Trades'),h('div',{className:'sv'},s.count)),
            h('div',{className:'sc'},h('div',{className:'sl'},'Win Rate'),h('div',{className:'sv '+(parseFloat(s.wr)>=50?'g':'r')},s.wr+'%')),
            h('div',{className:'sc'},h('div',{className:'sl'},'Net P&L'),h('div',{className:'sv '+(parseFloat(s.pnl)>=0?'g':'r')},s.pnl))
          ),
          h('div',{style:{marginTop:8,fontSize:10,color:'#4a5268',fontFamily:'IBM Plex Mono'}},
            'Pairs: '+s.pairs.slice(0,6).join(', ')+(s.pairs.length>6?'...':''))
        );
      }

      return h('div',{className:'card'},
        h('span',{className:'ct'},'Session Breakdown'),
        h('div',{style:{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}},
          sessions.map(function(sess){
            return h(SCard,{key:sess.key, s:sessionStats(sess.key), sess:sess});
          })
        )
      );
    }

    function Dashboard(props) {
      var trades=props.trades, accent=props.accent, name=props.name, onClear=props.onClear;
      var m = calcStats(trades);
      if (!m) return h('div',{style:{padding:40,textAlign:'center',color:'#4a5268',fontFamily:'IBM Plex Mono',fontSize:12}},'No trades.');
      var mx = Math.max.apply(null, m.pairStats.map(function(p){return Math.abs(p.pnl);}));
      mx = mx || 0.001;
      var stats = [
        ['Trades',m.total,''],['Win Rate',m.winRate+'%',m.winRate>=50?'g':'r'],
        ['Net P&L',m.totalPnl,m.totalPnl>=0?'g':'r'],['Expectancy',m.exp,m.exp>=0?'g':'r'],
        ['Profit Factor',m.pf,parseFloat(m.pf)>=1.5?'g':parseFloat(m.pf)>=1?'y':'r'],
        ['Avg Dur',m.avgDur+'m','b'],['Max DD','-'+m.maxDD,'r'],
        ['Gross W','+'+m.grossW,'g'],['Gross L','-'+m.grossL,'r']
      ];
      return h('div',null,
        h('div',{className:'info-row'},
          h('div',{className:'info-lbl'},trades.length+' trades loaded · '+name),
          h('button',{className:'clear-btn',onClick:onClear},'✕ Clear data')
        ),
        h('div',{className:'strip'},stats.map(function(s){
          return h('div',{className:'sc',key:s[0]},h('div',{className:'sl'},s[0]),h('div',{className:'sv '+s[2]},s[1]));
        })),
        (props.isOrb || props.isSf) && h(SessionBreakdown,{trades:trades,isSf:props.isSf}),
        h('div',{className:'g21'},
          h('div',{className:'card'},
            h('span',{className:'ct'},'Equity Curve + 7-Trade MA'),
            h(RC.ResponsiveContainer,{width:'100%',height:200},
              h(RC.AreaChart,{data:m.pnlMA},
                h('defs',null,h('linearGradient',{id:'eqgrad',x1:'0',y1:'0',x2:'0',y2:'1'},
                  h('stop',{offset:'5%',stopColor:accent,stopOpacity:.25}),
                  h('stop',{offset:'95%',stopColor:accent,stopOpacity:0}))),
                h(RC.CartesianGrid,{strokeDasharray:'3 3',stroke:'#1c2030'}),
                h(RC.XAxis,{dataKey:'i',tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.YAxis,{tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.Tooltip,{contentStyle:tt}),
                h(RC.ReferenceLine,{y:0,stroke:'#2a2f40'}),
                h(RC.Area,{type:'monotone',dataKey:'v',stroke:accent,strokeWidth:1.5,fill:'url(#eqgrad)',dot:false,name:'Equity'}),
                h(RC.Line,{type:'monotone',dataKey:'ma',stroke:'#4d9fff',strokeWidth:1.5,dot:false,strokeDasharray:'4 2',name:'7-MA'})
              )
            )
          ),
          h('div',{className:'card'},
            h('span',{className:'ct'},'R Distribution'),
            h(RC.ResponsiveContainer,{width:'100%',height:200},
              h(RC.BarChart,{data:m.rDist},
                h(RC.CartesianGrid,{strokeDasharray:'3 3',stroke:'#1c2030'}),
                h(RC.XAxis,{dataKey:'r',tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.YAxis,{tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.Tooltip,{contentStyle:tt}),
                h(RC.Bar,{dataKey:'c',radius:[3,3,0,0]},
                  m.rDist.map(function(d,i){return h(RC.Cell,{key:i,fill:d.r>=0?accent:'#ff3d5a'});})
                )
              )
            )
          )
        ),
        h('div',{className:'g12'},
          h('div',{className:'card'},
            h('span',{className:'ct'},'Day of Week P&L'),
            h(RC.ResponsiveContainer,{width:'100%',height:170},
              h(RC.BarChart,{data:m.dowStats},
                h(RC.CartesianGrid,{strokeDasharray:'3 3',stroke:'#1c2030'}),
                h(RC.XAxis,{dataKey:'day',tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.YAxis,{tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.Tooltip,{contentStyle:tt}),
                h(RC.ReferenceLine,{y:0,stroke:'#2a2f40'}),
                h(RC.Bar,{dataKey:'pnl',radius:[3,3,0,0]},
                  m.dowStats.map(function(d,i){return h(RC.Cell,{key:i,fill:d.pnl>=0?accent:'#ff3d5a'});})
                )
              )
            )
          ),
          h('div',{className:'card'},
            h('span',{className:'ct'},'Calendar Heatmap · Last 35 Days'),
            h(Heatmap,{cal:m.cal})
          )
        ),
        h('div',{className:'g2'},
          h('div',{className:'card'},
            h('span',{className:'ct'},'AI Insights'),
            m.ins.length
              ? m.ins.map(function(x,i){return h('div',{className:'ins',key:i},h('div',{className:'ins-i'},['📈','⚠️','🎯','💡'][i]||'💡'),h('div',{className:'ins-t',dangerouslySetInnerHTML:{__html:x}}));})
              : h('div',{style:{color:'#4a5268',fontSize:12,padding:8}},'Need more trades for insights.')
          ),
          h('div',{className:'card'},
            h('span',{className:'ct'},'Pair P&L Comparison'),
            h(RC.ResponsiveContainer,{width:'100%',height:Math.max(140,m.pairStats.length*36)},
              h(RC.BarChart,{data:m.pairStats,layout:'vertical',margin:{left:60}},
                h(RC.CartesianGrid,{strokeDasharray:'3 3',stroke:'#1c2030'}),
                h(RC.XAxis,{type:'number',tick:{fill:'#4a5268',fontSize:9},tickLine:false}),
                h(RC.YAxis,{type:'category',dataKey:'pair',tick:{fill:'#8892a8',fontSize:11},width:60,tickLine:false}),
                h(RC.Tooltip,{contentStyle:tt}),
                h(RC.ReferenceLine,{x:0,stroke:'#2a2f40'}),
                h(RC.Bar,{dataKey:'pnl',radius:[0,4,4,0]},
                  m.pairStats.map(function(p,i){return h(RC.Cell,{key:i,fill:p.pnl>=0?accent:'#ff3d5a'});})
                )
              )
            )
          )
        ),
        h('div',{className:'st'},'Pair Performance'),
        h('div',{className:'pgrid'},m.pairStats.map(function(p,i){
          var c = p.pnl>=0?accent:'#ff3d5a';
          var pct = Math.abs(p.pnl)/mx*100;
          return h('div',{className:'pcard',key:p.pair,style:{borderColor:p.pnl>=0?'rgba(0,255,136,.15)':'rgba(255,61,90,.15)'}},
            h('div',{className:'pbar-top',style:{background:c}}),
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('div',{className:'pn',style:{color:p.pnl>=0?'#f0f2f7':'#ff6b7a'}},p.pair),
              h('div',{style:{fontFamily:'IBM Plex Mono',fontSize:13,fontWeight:600,color:c}},(p.pnl>=0?'+':'')+p.pnl)
            ),
            h('div',{className:'ps'},'#'+(i+1)+' · '+p.count+' trades · '+p.avgDur+'m avg'),
            h('div',{className:'pr'},h('span',null,'Win Rate'),h('strong',{style:{fontFamily:'IBM Plex Mono',color:p.wr>=50?accent:'#ff3d5a'}},p.wr+'%')),
            h('div',{className:'pb'},h('div',{className:'pbf',style:{width:pct+'%',background:c}}))
          );
        })),
        h('div',{className:'st'},'Trade Log — click a row for details'),
        h(TradeLog,{trades:trades,accent:accent})
      );
    }

    function TradeLog(props) {
      var trades=props.trades, accent=props.accent;
      var selRef = useState(null);
      var sel=selRef[0], setSel=selRef[1];

      function toggleRow(t) { setSel(sel && sel.id===t.id ? null : t); }

      function DetailPanel(props) {
        var t = props.trade;
        var hasMax = t.maxProfit != null || t.maxDrawdown != null;
        function dv(val, cls) { return h('div',{className:'detail-value '+(cls||'')}, val != null ? val : '—'); }
        return h('div',{className:'detail-panel'},
          h('div',{style:{color:accent,fontWeight:700,fontSize:13}},t.pair+' · '+t.direction.toUpperCase()+' · '+(t.win?'✅ WIN':'❌ LOSS')),
          h('div',{className:'detail-grid'},
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Entry'),dv(t.entry)),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Exit'),dv(t.exit)),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Net P&L'),dv((t.pnl>=0?'+':'')+t.pnl, t.pnl>=0?'g':'r')),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'R Multiple'),dv(t.rMultiple, t.rMultiple>=0?'g':'r')),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Duration'),dv(t.durationMin+'m','b')),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Session'),dv(t.session||'—','b')),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Date'),dv(t.date)),
            h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Units'),dv(t.units)),
            hasMax && h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Max Profit'),dv(t.maxProfit!=null?(t.maxProfit>=0?'+':'')+t.maxProfit.toFixed(5):null,'g')),
            hasMax && h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Max Drawdown'),dv(t.maxDrawdown!=null?t.maxDrawdown.toFixed(5):null,'r')),
            hasMax && h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Price High'),dv(t.maxPrice)),
            hasMax && h('div',{className:'detail-item'},h('div',{className:'detail-label'},'Price Low'),dv(t.minPrice))
          ),
          !hasMax && h('div',{style:{color:'#4a5268',fontSize:10,marginTop:8}},'⚠ Max profit/drawdown tracked on new trades only')
        );
      }

      return h('div',{className:'card'},
        h('table',{className:'tbl'},
          h('thead',null,h('tr',null,['Date','Pair','Dir','Entry','Exit','P&L','Dur','R','Result'].map(function(k){return h('th',{key:k},k);}))),
          h('tbody',null,trades.slice(0,30).map(function(t){
            var isSelected = sel && sel.id===t.id;
            return h(React.Fragment,{key:t.id},
              h('tr',{className:isSelected?'selected':'',onClick:function(){toggleRow(t);}},
                h('td',{className:'mn',style:{color:'#4a5268'}},t.date),
                h('td',{style:{fontWeight:600}},t.pair),
                h('td',null,h('span',{className:'tag '+t.direction},t.direction.toUpperCase())),
                h('td',{className:'mn'},t.entry),
                h('td',{className:'mn'},t.exit),
                h('td',{className:'mn',style:{color:t.pnl>=0?'#00ff88':'#ff3d5a'}},(t.pnl>=0?'+':'')+t.pnl),
                h('td',{className:'mn',style:{color:'#4a5268'}},t.durationMin+'m'),
                h('td',{className:'mn',style:{color:t.rMultiple>=0?'#00ff88':'#ff3d5a'}},t.rMultiple),
                h('td',null,h('span',{className:'tag '+(t.win?'win':'loss')},t.win?'WIN':'LOSS'))
              ),
              isSelected && h('tr',{key:t.id+'-detail'},
                h('td',{colSpan:9,style:{padding:'0 0 8px 0',borderBottom:'1px solid #1c2030'}},
                  h(DetailPanel,{trade:t})
                )
              )
            );
          }))
        )
      );
    }

    function PastePanel(props) {
      var tab=props.tab, onLoad=props.onLoad;
      var stateRef = useState('');
      var text=stateRef[0], setText=stateRef[1];
      var errRef = useState('');
      var err=errRef[0], setErr=errRef[1];
      var loadingRef = useState(false);
      var loading=loadingRef[0], setLoading=loadingRef[1];

      function tryFetch() {
        setLoading(true); setErr('');
        fetch(URLS[tab])
          .then(function(r){return r.json();})
          .then(function(j){
            onLoad(parseTrades(j));
            setLoading(false);
          })
          .catch(function(e){
            setErr('Auto-fetch failed (CORS). Paste JSON manually instead.');
            setLoading(false);
          });
      }

      function handlePaste() {
        setErr('');
        try {
          var j = JSON.parse(text.trim());
          onLoad(parseTrades(j));
        } catch(e) { setErr(e.message); }
      }

      return h('div',{className:'paste-wrap'},
        h('div',{className:'paste-title'},'LOAD TRADE DATA'),
        h('div',{className:'paste-sub'},'Option 1: Click Auto-Load (works in browser, may be blocked by CORS)\nOption 2: Open the URL → copy all text → paste below'),
        h('div',{style:{marginBottom:16}},
          h('button',{className:'btn',onClick:tryFetch,disabled:loading},loading?'Loading...':'⚡ Auto-Load from Railway'),
        ),
        err && h('div',{className:'err'},'⚠ '+err),
        h('textarea',{className:'paste-area',value:text,onChange:function(e){setText(e.target.value);},placeholder:'Paste JSON response here...\n{"ok":true,"trades":[{"openTime":"2026-..."},...]}'}),
        h('button',{className:'btn',onClick:handlePaste},'LOAD PASTED JSON →'),
        h('div',{className:'url-row'},'Data URL: ',h('a',{href:URLS[tab],target:'_blank'},URLS[tab]))
      );
    }

    function App() {
      var tabRef    = useState('orb');
      var tab=tabRef[0], setTab=tabRef[1];
      var tradesRef = useState({orb:null,sf:null,ma:null});
      var trades=tradesRef[0], setTrades=tradesRef[1];

      var TABS = [
        {id:'orb',label:'📦 ORB',      cls:'orb',accent:'#ffcc00'},
        {id:'sf', label:'🦈 Sharkfin', cls:'sf', accent:'#ff3d5a'},
        {id:'ma', label:'📈 Mabouncer',cls:'ma', accent:'#00ff88'},
      ];

      var SESSION_TABS = {
        orb: [{id:'all',label:'All'},{id:'Asia',label:'🌏 Asia'},{id:'NY',label:'🗽 NY'}],
        sf:  [{id:'all',label:'All'},{id:'London',label:'🇬🇧 London'},{id:'London/NY',label:'⚡ London/NY'},{id:'NY',label:'🗽 NY'}],
        ma:  [],
      };

      var active  = TABS.find(function(t){return t.id===tab;});
      var rawTrades = trades[tab];
      var sesTabsRef = useState('all');
      var sesTab=sesTabsRef[0], setSesTab=sesTabsRef[1];
      var current = rawTrades && sesTab !== 'all'
        ? rawTrades.filter(function(t){return t.session===sesTab;})
        : rawTrades;

      function setTabTrades(data) {
        setTrades(function(s){var n=Object.assign({},s);n[tab]=data;return n;});
      }
      function clearTab() {
        setTrades(function(s){var n=Object.assign({},s);n[tab]=null;return n;});
      }

      return h('div',null,
        h('div',{className:'hdr'},
          h('div',{className:'brand'},
            h('div',{style:{fontSize:20}},'⚡'),
            h('div',null,
              h('div',{className:'bname'},'TRADE ANALYTICS'),
              h('div',{className:'bsub'},'3 BOTS LIVE')
            )
          ),
          h('div',{className:'tabs'},TABS.map(function(t){
            return h('button',{key:t.id,className:'tab '+t.cls+(tab===t.id?' on':''),onClick:function(){setTab(t.id);setSesTab('all');}},
              t.label,
              trades[t.id] && h('span',{style:{fontSize:8,fontFamily:'IBM Plex Mono',color:t.accent,marginLeft:4}},trades[t.id].length+'T')
            );
          }))
        ),
        SESSION_TABS[tab] && SESSION_TABS[tab].length > 0 && rawTrades && h('div',{style:{display:'flex',gap:4,padding:'0 24px',background:'var(--bg2)',borderBottom:'1px solid var(--border)'}},
          SESSION_TABS[tab].map(function(s){
            var isActive = sesTab===s.id;
            return h('button',{
              key:s.id,
              onClick:function(){setSesTab(s.id);},
              style:{
                padding:'8px 16px',
                fontSize:11,
                fontWeight:600,
                fontFamily:'IBM Plex Mono,monospace',
                background:'none',
                border:'none',
                borderBottom: isActive ? '2px solid '+active.accent : '2px solid transparent',
                color: isActive ? active.accent : '#4a5268',
                cursor:'pointer',
                transition:'all .15s',
              }
            }, s.label,
            rawTrades && s.id !== 'all' && h('span',{style:{fontSize:9,marginLeft:4,color:'#4a5268'}},
              rawTrades.filter(function(t){return t.session===s.id;}).length+'T'
            ))
          })
        ),
        h('div',{className:'page'},
          current
            ? h(Dashboard,{trades:current,accent:active.accent,name:active.label,onClear:clearTab,isOrb:tab==='orb'&&sesTab==='all',isSf:tab==='sf'&&sesTab==='all'})
            : h(PastePanel,{tab:tab,onLoad:setTabTrades})
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  } catch(e) {
    document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace;color:#ff3d5a;background:#050608;min-height:100vh"><h2 style="margin-bottom:12px">Startup Error</h2><pre>'+e.stack+'</pre></div>';
  }
});
</script>
</body>
</html>
