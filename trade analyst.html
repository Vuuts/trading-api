<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADE ANALYST — AI Pattern Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

:root {
–bg:      #07080d;
–bg1:     #0d0f17;
–bg2:     #12151f;
–border:  #1c2030;
–t1:      #e8eaf0;
–t2:      #6b7280;
–t3:      #3d4455;
–green:   #00ff88;
–red:     #ff3d5a;
–yellow:  #ffcc00;
–purple:  #a855f7;
–blue:    #4d9fff;
–mono:    ‘Space Mono’, monospace;
–sans:    ‘Syne’, sans-serif;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–t1);
font-family: var(–mono);
min-height: 100vh;
overflow-x: hidden;
}

/* Grid background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(77,159,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(77,159,255,.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px; }

/* Header */
.hdr {
display: flex;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 40px;
gap: 20px;
}
.hdr-left {}
.logo {
font-family: var(–sans);
font-size: 11px;
font-weight: 700;
letter-spacing: 4px;
color: var(–t3);
text-transform: uppercase;
margin-bottom: 6px;
}
.title {
font-family: var(–sans);
font-size: 32px;
font-weight: 800;
color: var(–t1);
line-height: 1;
letter-spacing: -1px;
}
.title span { color: var(–purple); }
.subtitle {
font-size: 10px;
color: var(–t2);
margin-top: 8px;
letter-spacing: 1px;
}

/* Bot selector */
.bot-selector {
display: flex;
gap: 8px;
flex-wrap: wrap;
}
.bot-btn {
background: var(–bg2);
border: 1px solid var(–border);
color: var(–t2);
font-family: var(–mono);
font-size: 11px;
font-weight: 700;
padding: 8px 16px;
border-radius: 6px;
cursor: pointer;
transition: all .15s;
letter-spacing: 1px;
}
.bot-btn:hover { border-color: var(–purple); color: var(–t1); }
.bot-btn.active { background: rgba(168,85,247,.15); border-color: var(–purple); color: var(–purple); }

/* Status bar */
.status-bar {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 16px;
background: var(–bg1);
border: 1px solid var(–border);
border-radius: 8px;
margin-bottom: 24px;
font-size: 10px;
color: var(–t2);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(–t3); flex-shrink: 0; }
.status-dot.loading { background: var(–yellow); animation: pulse 1s infinite; }
.status-dot.ready   { background: var(–green); }
.status-dot.error   { background: var(–red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Trade summary strip */
.summary-strip {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
gap: 1px;
background: var(–border);
border: 1px solid var(–border);
border-radius: 10px;
overflow: hidden;
margin-bottom: 24px;
}
.stat {
background: var(–bg1);
padding: 14px 16px;
}
.stat-label { font-size: 9px; color: var(–t3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.stat-val   { font-size: 18px; font-weight: 700; color: var(–t1); }
.stat-val.g { color: var(–green); }
.stat-val.r { color: var(–red); }
.stat-val.p { color: var(–purple); }

/* Prompt area */
.prompt-section {
background: var(–bg1);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
margin-bottom: 24px;
}
.prompt-header {
padding: 14px 20px;
border-bottom: 1px solid var(–border);
font-size: 10px;
color: var(–t2);
letter-spacing: 2px;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 8px;
}
.prompt-header span { color: var(–purple); }

.quick-prompts {
padding: 16px 20px 0;
display: flex;
gap: 8px;
flex-wrap: wrap;
}
.qp {
background: var(–bg2);
border: 1px solid var(–border);
color: var(–t2);
font-family: var(–mono);
font-size: 10px;
padding: 6px 12px;
border-radius: 20px;
cursor: pointer;
transition: all .15s;
white-space: nowrap;
}
.qp:hover { border-color: var(–purple); color: var(–purple); background: rgba(168,85,247,.08); }

.prompt-input-wrap {
padding: 16px 20px 20px;
display: flex;
gap: 12px;
align-items: flex-end;
}
textarea {
flex: 1;
background: var(–bg2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–t1);
font-family: var(–mono);
font-size: 12px;
padding: 12px 14px;
resize: none;
outline: none;
min-height: 80px;
transition: border-color .15s;
line-height: 1.6;
}
textarea:focus { border-color: var(–purple); }
textarea::placeholder { color: var(–t3); }

.analyze-btn {
background: var(–purple);
border: none;
color: #fff;
font-family: var(–mono);
font-size: 11px;
font-weight: 700;
padding: 12px 20px;
border-radius: 8px;
cursor: pointer;
letter-spacing: 1px;
transition: all .15s;
white-space: nowrap;
align-self: flex-end;
height: 44px;
}
.analyze-btn:hover:not(:disabled) { background: #9333ea; transform: translateY(-1px); }
.analyze-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* Response area */
.response-section {
background: var(–bg1);
border: 1px solid var(–border);
border-radius: 12px;
overflow: hidden;
display: none;
}
.response-section.visible { display: block; }

.response-header {
padding: 14px 20px;
border-bottom: 1px solid var(–border);
font-size: 10px;
color: var(–t2);
letter-spacing: 2px;
text-transform: uppercase;
display: flex;
align-items: center;
justify-content: space-between;
}
.response-header-left { display: flex; align-items: center; gap: 8px; }
.thinking-indicator {
display: flex;
gap: 4px;
align-items: center;
}
.thinking-dot {
width: 4px; height: 4px; border-radius: 50%;
background: var(–purple);
animation: thinking .8s infinite;
}
.thinking-dot:nth-child(2) { animation-delay: .15s; }
.thinking-dot:nth-child(3) { animation-delay: .3s; }
@keyframes thinking { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

.copy-btn {
background: var(–bg2);
border: 1px solid var(–border);
color: var(–t2);
font-family: var(–mono);
font-size: 10px;
padding: 4px 10px;
border-radius: 4px;
cursor: pointer;
transition: all .15s;
}
.copy-btn:hover { color: var(–t1); border-color: var(–t2); }

.response-body {
padding: 24px;
font-size: 13px;
line-height: 1.8;
color: var(–t1);
white-space: pre-wrap;
min-height: 100px;
}

/* Markdown-ish styling in response */
.response-body strong { color: var(–purple); font-weight: 700; }
.response-body em { color: var(–yellow); font-style: normal; }

/* History */
.history-section { margin-top: 24px; }
.history-label {
font-size: 9px;
color: var(–t3);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 12px;
}
.history-item {
background: var(–bg1);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px 16px;
margin-bottom: 8px;
cursor: pointer;
transition: all .15s;
}
.history-item:hover { border-color: var(–purple); }
.history-q { font-size: 11px; color: var(–t2); margin-bottom: 4px; }
.history-a { font-size: 10px; color: var(–t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Error */
.err-box {
background: rgba(255,61,90,.05);
border: 1px solid rgba(255,61,90,.2);
border-radius: 8px;
padding: 12px 16px;
font-size: 11px;
color: var(–red);
margin-top: 12px;
display: none;
}
.err-box.visible { display: block; }

/* Loader shimmer on stats */
.shimmer {
background: linear-gradient(90deg, var(–bg2) 25%, var(–bg1) 50%, var(–bg2) 75%);
background-size: 200% 100%;
animation: shimmer 1.2s infinite;
border-radius: 4px;
height: 18px;
width: 60px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>

</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">Vuuts Trading System</div>
      <div class="title">TRADE <span>ANALYST</span></div>
      <div class="subtitle">AI-POWERED PATTERN RECOGNITION · CLOSED TRADE HISTORY</div>
    </div>
    <div class="bot-selector">
      <button class="bot-btn active" data-bot="all">ALL BOTS</button>
      <button class="bot-btn" data-bot="orb">📦 ORB</button>
      <button class="bot-btn" data-bot="sf">🦈 SF</button>
      <button class="bot-btn" data-bot="div">🔀 DIVERGE</button>
      <button class="bot-btn" data-bot="ma">📈 MA</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">Loading trade history...</span>
    <span style="margin-left:auto;color:var(--t3)" id="tradeCount"></span>
  </div>

  <div class="summary-strip" id="summaryStrip">
    <div class="stat"><div class="stat-label">Trades</div><div class="shimmer"></div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="shimmer"></div></div>
    <div class="stat"><div class="stat-label">Net P&L</div><div class="shimmer"></div></div>
    <div class="stat"><div class="stat-label">Avg R</div><div class="shimmer"></div></div>
    <div class="stat"><div class="stat-label">Best Pair</div><div class="shimmer"></div></div>
    <div class="stat"><div class="stat-label">Best Session</div><div class="shimmer"></div></div>
  </div>

  <div class="prompt-section">
    <div class="prompt-header">
      <span>⬡</span> ASK THE ANALYST
    </div>
    <div class="quick-prompts" id="quickPrompts">
      <button class="qp" data-q="What patterns do you see in my winning trades vs losing trades?">Win vs Loss patterns</button>
      <button class="qp" data-q="Which trading session (London, NY, London/NY) is most profitable and why?">Best session</button>
      <button class="qp" data-q="Which pairs are performing best and worst? Should I stop trading any of them?">Pair performance</button>
      <button class="qp" data-q="What does my R-multiple distribution look like? Am I cutting winners short or letting losers run?">R-multiple analysis</button>
      <button class="qp" data-q="Are there any time-of-day patterns in my wins and losses?">Time patterns</button>
      <button class="qp" data-q="Give me a brutally honest assessment of this trading system's edge. Is it actually profitable?">Honest assessment</button>
      <button class="qp" data-q="What should I focus on to improve performance over the next 30 days?">Next 30 days</button>
      <button class="qp" data-q="Compare the performance of each bot. Which one has the strongest edge?">Bot comparison</button>
    </div>
    <div class="prompt-input-wrap">
      <textarea id="promptInput" placeholder="Ask anything about your trade history — patterns, edge, improvements, risk..."></textarea>
      <button class="analyze-btn" id="analyzeBtn" disabled>ANALYZE →</button>
    </div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="response-section" id="responseSection">
    <div class="response-header">
      <div class="response-header-left">
        <span style="color:var(--purple)">⬡</span>
        <span>ANALYST RESPONSE</span>
        <div class="thinking-indicator" id="thinkingIndicator" style="display:none">
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
        </div>
      </div>
      <button class="copy-btn" id="copyBtn">COPY</button>
    </div>
    <div class="response-body" id="responseBody"></div>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">Recent Queries</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
const API_BASE = 'https://web-production-f5a70.up.railway.app';
const URLS = {
  orb: API_BASE + '/trades/orb',
  sf:  API_BASE + '/trades/sharkfin',
  div: API_BASE + '/trades/diverge',
  ma:  API_BASE + '/trades/alpaca',
};

let allTrades = {};   // { orb: [...], sf: [...], div: [...], ma: [...] }
let activeBots = ['orb','sf','div','ma'];
let selectedBot = 'all';
let queryHistory = [];
let isAnalyzing = false;

// ── Fetch trades ──────────────────────────────────────────────────────────────
async function fetchAllTrades() {
  setStatus('loading', 'Loading trade history...');
  const results = await Promise.allSettled(
    Object.entries(URLS).map(async ([bot, url]) => {
      const r = await fetch(url);
      const d = await r.json();
      const trades = d.trades || d.results || [];
      allTrades[bot] = trades;
      return { bot, count: trades.length };
    })
  );

  const total = Object.values(allTrades).reduce((s, t) => s + t.length, 0);
  if (total === 0) {
    setStatus('error', 'No trades found — bots may not have traded yet');
    return;
  }

  setStatus('ready', `Trade history loaded`);
  document.getElementById('tradeCount').textContent = `${total} closed trades`;
  renderSummary();
  document.getElementById('analyzeBtn').disabled = false;
}

// ── Get active trades based on bot filter ────────────────────────────────────
function getActiveTrades() {
  if (selectedBot === 'all') {
    return Object.values(allTrades).flat();
  }
  return allTrades[selectedBot] || [];
}

// ── Render summary strip ──────────────────────────────────────────────────────
function renderSummary() {
  const trades = getActiveTrades();
  if (!trades.length) {
    document.getElementById('summaryStrip').innerHTML = `
      <div class="stat" style="grid-column:1/-1;text-align:center;color:var(--t3);font-size:11px;padding:20px">
        No trades yet for this bot
      </div>`;
    return;
  }

  const wins    = trades.filter(t => parseFloat(t.pnl || t.realizedPL || 0) > 0);
  const wr      = ((wins.length / trades.length) * 100).toFixed(1);
  const netPnl  = trades.reduce((s, t) => s + parseFloat(t.pnl || t.realizedPL || 0), 0);
  const avgR    = trades.reduce((s, t) => s + parseFloat(t.rMultiple || 0), 0) / trades.length;

  // Best pair
  const pairMap = {};
  trades.forEach(t => {
    const p = t.pair || t.instrument || 'UNKNOWN';
    if (!pairMap[p]) pairMap[p] = { pnl: 0, count: 0 };
    pairMap[p].pnl += parseFloat(t.pnl || 0);
    pairMap[p].count++;
  });
  const bestPair = Object.entries(pairMap).sort((a,b) => b[1].pnl - a[1].pnl)[0];

  // Best session
  const sessMap = {};
  trades.forEach(t => {
    const s = t.session || 'Unknown';
    if (!sessMap[s]) sessMap[s] = { pnl: 0 };
    sessMap[s].pnl += parseFloat(t.pnl || 0);
  });
  const bestSess = Object.entries(sessMap).sort((a,b) => b[1].pnl - a[1].pnl)[0];

  document.getElementById('summaryStrip').innerHTML = `
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-val p">${trades.length}</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-val ${parseFloat(wr)>=50?'g':'r'}">${wr}%</div></div>
    <div class="stat"><div class="stat-label">Net P&L</div><div class="stat-val ${netPnl>=0?'g':'r'}">${netPnl>=0?'+':''}${netPnl.toFixed(2)}</div></div>
    <div class="stat"><div class="stat-label">Avg R</div><div class="stat-val ${avgR>=0?'g':'r'}">${avgR>=0?'+':''}${avgR.toFixed(2)}R</div></div>
    <div class="stat"><div class="stat-label">Best Pair</div><div class="stat-val" style="font-size:13px">${bestPair ? bestPair[0].replace('_','/') : '—'}</div></div>
    <div class="stat"><div class="stat-label">Best Session</div><div class="stat-val" style="font-size:12px">${bestSess ? bestSess[0] : '—'}</div></div>
  `;
}

// ── Build trade data summary for Claude ──────────────────────────────────────
function buildTradeContext() {
  const trades = getActiveTrades();
  if (!trades.length) return 'No trades available.';

  const wins   = trades.filter(t => parseFloat(t.pnl || 0) > 0);
  const losses = trades.filter(t => parseFloat(t.pnl || 0) <= 0);
  const netPnl = trades.reduce((s, t) => s + parseFloat(t.pnl || 0), 0);

  // Pair breakdown
  const pairMap = {};
  trades.forEach(t => {
    const p = t.pair || t.instrument || 'UNKNOWN';
    if (!pairMap[p]) pairMap[p] = { wins: 0, losses: 0, pnl: 0 };
    const pnl = parseFloat(t.pnl || 0);
    if (pnl > 0) pairMap[p].wins++; else pairMap[p].losses++;
    pairMap[p].pnl += pnl;
  });

  // Session breakdown
  const sessMap = {};
  trades.forEach(t => {
    const s = t.session || 'Unknown';
    if (!sessMap[s]) sessMap[s] = { wins: 0, losses: 0, pnl: 0 };
    const pnl = parseFloat(t.pnl || 0);
    if (pnl > 0) sessMap[s].wins++; else sessMap[s].losses++;
    sessMap[s].pnl += pnl;
  });

  // Bot breakdown
  const botMap = {};
  Object.entries(allTrades).forEach(([bot, bTrades]) => {
    if (!bTrades.length) return;
    const bWins = bTrades.filter(t => parseFloat(t.pnl || 0) > 0);
    botMap[bot] = {
      trades: bTrades.length,
      wins: bWins.length,
      wr: ((bWins.length / bTrades.length) * 100).toFixed(1),
      pnl: bTrades.reduce((s, t) => s + parseFloat(t.pnl || 0), 0).toFixed(4),
    };
  });

  // Duration analysis
  const avgDur = trades.reduce((s,t) => s + (t.durationMin || 0), 0) / trades.length;
  const winDur = wins.length ? wins.reduce((s,t) => s + (t.durationMin || 0), 0) / wins.length : 0;
  const lossDur = losses.length ? losses.reduce((s,t) => s + (t.durationMin || 0), 0) / losses.length : 0;

  // R-multiple dist
  const rDist = { 'neg': 0, '0-0.5': 0, '0.5-1': 0, '1+': 0, '2+': 0 };
  trades.forEach(t => {
    const r = parseFloat(t.rMultiple || 0);
    if (r < 0) rDist['neg']++;
    else if (r < 0.5) rDist['0-0.5']++;
    else if (r < 1) rDist['0.5-1']++;
    else if (r < 2) rDist['1+']++;
    else rDist['2+']++;
  });

  // Recent 10 trades
  const recent = [...trades]
    .sort((a,b) => new Date(b.openTime||b.date) - new Date(a.openTime||a.date))
    .slice(0, 10)
    .map(t => `  ${t.date||''} ${(t.pair||t.instrument||'').replace('_','/')} ${t.direction||''} PnL:${parseFloat(t.pnl||0).toFixed(4)} Session:${t.session||'?'} Dur:${t.durationMin||0}m R:${t.rMultiple||0}`)
    .join('\n');

  return `
TRADE DATA SUMMARY (Filter: ${selectedBot === 'all' ? 'All Bots' : selectedBot.toUpperCase()})
Generated: ${new Date().toUTCString()}

OVERVIEW
Total Trades: ${trades.length}
Wins: ${wins.length} | Losses: ${losses.length}
Win Rate: ${((wins.length/trades.length)*100).toFixed(1)}%
Net P&L: ${netPnl.toFixed(4)}
Avg Trade Duration: ${avgDur.toFixed(0)} minutes
Win Duration Avg: ${winDur.toFixed(0)}m | Loss Duration Avg: ${lossDur.toFixed(0)}m

BOT BREAKDOWN
${Object.entries(botMap).map(([b,s]) => `  ${b.toUpperCase()}: ${s.trades} trades | ${s.wr}% WR | PnL: ${s.pnl}`).join('\n')}

SESSION BREAKDOWN
${Object.entries(sessMap).sort((a,b) => b[1].pnl - a[1].pnl).map(([s,d]) => 
  `  ${s}: ${d.wins+d.losses} trades | ${((d.wins/(d.wins+d.losses))*100).toFixed(0)}% WR | PnL: ${d.pnl.toFixed(4)}`
).join('\n')}

PAIR BREAKDOWN (top 10 by P&L)
${Object.entries(pairMap).sort((a,b) => b[1].pnl - a[1].pnl).slice(0,10).map(([p,d]) =>
  `  ${p.replace('_','/')}: ${d.wins+d.losses} trades | ${((d.wins/(d.wins+d.losses))*100).toFixed(0)}% WR | PnL: ${d.pnl.toFixed(4)}`
).join('\n')}

R-MULTIPLE DISTRIBUTION
  Negative R: ${rDist['neg']} trades
  0–0.5R: ${rDist['0-0.5']} trades
  0.5–1R: ${rDist['0.5-1']} trades
  1–2R: ${rDist['1+']} trades
  2R+: ${rDist['2+']} trades

RECENT 10 TRADES
${recent}
`.trim();
}

// ── Run analysis ──────────────────────────────────────────────────────────────
async function runAnalysis(question) {
  if (isAnalyzing) return;
  isAnalyzing = true;

  const btn = document.getElementById('analyzeBtn');
  const responseSection = document.getElementById('responseSection');
  const responseBody = document.getElementById('responseBody');
  const thinkingIndicator = document.getElementById('thinkingIndicator');
  const errBox = document.getElementById('errBox');

  btn.disabled = true;
  errBox.classList.remove('visible');
  responseSection.classList.add('visible');
  responseBody.textContent = '';
  thinkingIndicator.style.display = 'flex';

  const tradeContext = buildTradeContext();

  const systemPrompt = `You are an expert trading analyst reviewing the performance of an automated multi-bot forex and stock trading system.

The system runs 4 bots:
- ORB (Opening Range Breakout) — forex, OANDA live account
- Sharkfin — forex, Bollinger Band + RSI reversal strategy
- DIVERGE — forex, RSI divergence on Bollinger Bands
- Mabouncer — stocks, 200MA bounce strategy on Alpaca paper

Your job is to analyze the trade data provided and give honest, actionable insights. Be direct and specific. Use numbers. Don't sugarcoat poor performance. Point out real patterns, not generic advice.

Format your response clearly. Use **bold** for key findings. Use bullet points for lists. Keep it tight — no filler.`;

  const userMessage = `Here is my trading data:\n\n${tradeContext}\n\nQuestion: ${question}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    const data = await response.json();
    thinkingIndicator.style.display = 'none';

    if (data.error) {
      throw new Error(data.error.message || 'API error');
    }

    const text = data.content?.[0]?.text || 'No response received.';
    responseBody.innerHTML = formatResponse(text);

    // Save to history
    queryHistory.unshift({ q: question, a: text.slice(0, 120) + '...' });
    renderHistory();

  } catch (err) {
    thinkingIndicator.style.display = 'none';
    responseBody.textContent = '';
    errBox.textContent = `Error: ${err.message}`;
    errBox.classList.add('visible');
  }

  btn.disabled = false;
  isAnalyzing = false;
}

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^• /gm, '▸ ')
    .replace(/^- /gm, '▸ ');
}

// ── Render history ────────────────────────────────────────────────────────────
function renderHistory() {
  if (!queryHistory.length) return;
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = queryHistory.slice(0, 5).map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-q">${h.q}</div>
      <div class="history-a">${h.a}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const h = queryHistory[i];
  document.getElementById('responseSection').classList.add('visible');
  document.getElementById('responseBody').innerHTML = formatResponse(
    queryHistory[i].a.replace(/\.\.\.$/,'') + '\n\n[Showing cached response — re-run for fresh analysis]'
  );
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('analyzeBtn').addEventListener('click', () => {
  const q = document.getElementById('promptInput').value.trim();
  if (q) runAnalysis(q);
});

document.getElementById('promptInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.metaKey) {
    const q = e.target.value.trim();
    if (q) runAnalysis(q);
  }
});

document.querySelectorAll('.qp').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('promptInput').value = btn.dataset.q;
    runAnalysis(btn.dataset.q);
  });
});

document.querySelectorAll('.bot-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bot-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedBot = btn.dataset.bot;
    renderSummary();
  });
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('responseBody').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED ✓';
    setTimeout(() => btn.textContent = 'COPY', 1500);
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
fetchAllTrades();
</script>

</body>
